<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Auditoría Segura</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px; }
        #response { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Sistema de Auditoría Segura</h1>
    <form id="encryptForm">
        <label for="data">Datos a encriptar:</label><br>
        <input type="text" id="data" name="data" required><br>
        <button type="submit">Encriptar</button>
    </form>
    <div id="response"></div>

    <script>
        document.getElementById('encryptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = document.getElementById('data').value;
            try {
                const response = await fetch('/api/encrypt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data })
                });
                const result = await response.json();
                document.getElementById('response').innerText = JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('response').innerText = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
